name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build -c Release

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          mkdir -p package/BepInEx/plugins
          cp bin/Release/netstandard2.1/*.dll package/BepInEx/plugins/
          cp manifest.json icon.png README.md package/
          cd package && zip -r ../${{ github.event.repository.name }}-${{ steps.version.outputs.version }}.zip .

      - name: Upload to Thunderstore
        env:
          TS_TOKEN: ${{ secrets.THUNDERSTORE_TOKEN }}
        run: |
          ZIP="${{ github.event.repository.name }}-${{ steps.version.outputs.version }}.zip"
          METADATA='{"author_name":"maxenterme","communities":["repo"],"has_nsfw_content":false,"community_categories":{"repo":["mods","valuables"]}}'
          echo "Uploading $ZIP with metadata: $METADATA"
          RESULT=$(curl -sS -X POST \
            "https://thunderstore.io/api/experimental/submission/upload/" \
            -H "Authorization: Bearer $TS_TOKEN" \
            -F "file=@$ZIP" \
            -F "metadata=$METADATA")
          echo "Result: $RESULT"
          # Fail if error
          if echo "$RESULT" | jq -e '.detail // .file // .metadata // .errors' > /dev/null 2>&1; then
            echo "::error::Thunderstore upload failed"
            exit 1
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}-${{ steps.version.outputs.version }}.zip
